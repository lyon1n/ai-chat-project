services:
  - type: web
    name: ai-chat
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: USE_SQLITE
        value: "true"
      - key: SQLITE_PATH
        value: ./chat.db
      - key: CHROMA_PATH
        value: ./chroma_db
      - key: UPLOAD_DIR
        value: ./uploads
