name: Deploy Backend (Render)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "::error::请先在 GitHub Secrets 添加 RENDER_API_KEY"
            echo "获取地址: https://dashboard.render.com/u/settings#api-keys"
            exit 1
          fi

      - name: Create or update Render web service
        id: render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          set -e
          OWNERS=$(curl -sS -H "Authorization: Bearer $RENDER_API_KEY" \
            https://api.render.com/v1/owners)
          OWNER_ID=$(echo "$OWNERS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          item = data[0] if isinstance(data, list) else data
          print(item['owner']['id'])
          ")
          echo "owner_id=$OWNER_ID" >> "$GITHUB_OUTPUT"

          EXISTING=$(curl -sS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?limit=50")
          SERVICE_ID=$(echo "$EXISTING" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data:
              s = item.get('service', item)
              if s.get('name') == 'ai-chat-api':
                  print(s['id'])
                  break
          " || true)

          ENV_VARS=$(python3 <<PY
          import json, os
          vars = [
            {"key": "DEEPSEEK_API_KEY", "value": os.environ["DEEPSEEK_API_KEY"]},
            {"key": "JWT_SECRET_KEY", "value": os.environ["JWT_SECRET_KEY"]},
            {"key": "USE_SQLITE", "value": "true"},
            {"key": "SQLITE_PATH", "value": "/data/chat.db"},
            {"key": "CHROMA_PATH", "value": "/data/chroma_db"},
            {"key": "UPLOAD_DIR", "value": "/data/uploads"},
            {"key": "ALLOWED_ORIGINS", "value": "https://lyon1n.github.io,https://lyon1n.github.io/ai-chat-project"},
          ]
          print(json.dumps(vars))
          PY
          )

          if [ -z "$SERVICE_ID" ]; then
            echo "Creating new Render service..."
            export OWNER_ID
            export ENV_VARS
            BODY=$(python3 <<PY
          import json, os
          print(json.dumps({
            "type": "web_service",
            "name": "ai-chat-api",
            "ownerId": os.environ["OWNER_ID"],
            "repo": "https://github.com/lyon1n/ai-chat-project",
            "branch": "main",
            "serviceDetails": {
              "runtime": "python",
              "plan": "free",
              "region": "oregon",
              "healthCheckPath": "/health",
              "envSpecificDetails": {
                "buildCommand": "pip install -r requirements.txt",
                "startCommand": "uvicorn main:app --host 0.0.0.0 --port $PORT"
              },
              "envVars": json.loads(os.environ["ENV_VARS"])
            }
          }))
          PY
          )
            RESULT=$(curl -sS -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              https://api.render.com/v1/services)
            echo "$RESULT" | python3 -m json.tool
            SERVICE_ID=$(echo "$RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          s = data.get('service', data)
          print(s['id'])
          ")
          else
            echo "Service already exists: $SERVICE_ID"
            curl -sS -X PUT \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"envVars\": $(echo "$ENV_VARS")}" \
              "https://api.render.com/v1/services/$SERVICE_ID/env-vars" || true
            curl -sS -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
              -d '{"clearCache":"do_not_clear"}' \
              -H "Content-Type: application/json"
          fi
          echo "service_id=$SERVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for backend URL
        id: wait
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          SERVICE_ID="${{ steps.render.outputs.service_id }}"
          for i in $(seq 1 40); do
            INFO=$(curl -sS -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID")
            URL=$(echo "$INFO" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          s = data.get('service', data)
          print(s.get('serviceDetails', {}).get('url', '') or '')
          ")
            if [ -n "$URL" ]; then
              echo "url=$URL" >> "$GITHUB_OUTPUT"
              echo "Backend live at: $URL"
              curl -sf "$URL/health" && exit 0 || true
            fi
            echo "Waiting... ($i/40)"
            sleep 15
          done
          echo "Deploy started. Check Render dashboard for URL."

      - name: Point frontend to Render backend
        if: steps.wait.outputs.url != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh secret set VITE_API_URL --repo lyon1n/ai-chat-project \
            --body "${{ steps.wait.outputs.url }}"
          gh workflow run "Deploy Frontend" --repo lyon1n/ai-chat-project
